<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EC2 Control Panel</title>
<link rel="stylesheet" href="/assets/pico.min.css">
<style>
  :root {
    --c-success: #16a34a;
    --c-danger:  #dc2626;
    --c-change:  #f59e0b;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  main.container { max-width: 90%; padding-block: 1.5rem; }
  h1 { font-size: 1.4rem; margin-bottom: 1rem; }
  article { padding: 1rem 1.25rem; margin-bottom: 1rem; }
  article > header { margin-bottom: .75rem; padding-block: 0; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
  button { margin: 0; }
  button.success { --pico-background-color: var(--c-success); --pico-border-color: var(--c-success); --pico-color: white; }
  button.success:hover:not(:disabled) { --pico-background-hover: #15803d; --pico-border-hover: #15803d; }
  button.danger  { --pico-background-color: var(--c-danger);  --pico-border-color: var(--c-danger);  --pico-color: white; }
  button.danger:hover:not(:disabled)  { --pico-background-hover: #b91c1c; --pico-border-hover: #b91c1c; }
  button.icon { display: inline-flex; align-items: center; justify-content: center; }
  button.icon svg { display: block; width: 1em; height: 1em; }
  button.icon.busy svg { animation: spin .8s linear infinite; color: var(--pico-primary, #2563eb); }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Table */
  table { width: 100%; margin: 0; }
  th, td { padding: .5rem .6rem; vertical-align: top; font-size: .9rem; }
  thead th { font-size: .78rem; text-transform: uppercase; letter-spacing: .03em; color: var(--pico-muted-color); }
  thead th[data-sort] { cursor: pointer; user-select: none; white-space: nowrap; }
  thead th[data-sort]:hover { color: var(--pico-color); }
  thead th.sorted-asc::after  { content: " \25B2"; font-size: .8em; }
  thead th.sorted-desc::after { content: " \25BC"; font-size: .8em; }
  td.c-act { white-space: nowrap; }
  .inst-name { font-weight: 600; }
  .inst-owner { display: block; font-size: .75rem; color: var(--pico-muted-color); }

  /* Editable cell controls sized to fit the table. Height/line-height are
     pinned so <select> and <input> line up — their intrinsic heights differ. */
  td select, td input[type="text"] {
    margin: 0;
    padding: .3rem .45rem;
    font-size: .85rem;
    line-height: 1.4;
    height: 2.1rem;
    box-sizing: border-box;
    min-width: 8rem;
    width: 100%;
  }
  td.c-type { min-width: 15rem; }
  td.c-az   { max-width: 11rem; }
  td.c-req  { max-width: 9rem; }
  /* Changed-but-not-applied fields glow amber. */
  .changed { border-color: var(--c-change) !important; background: #fffbeb !important; }

  .act-btns { display: flex; gap: .35rem; }
  .act-btns button { padding: .3rem .55rem; font-size: .8rem; }
  .badge { display: inline-block; margin-bottom: .35rem; font-size: .72rem; color: #92400e;
    background: #fef3c7; border: 1px solid #fcd34d; border-radius: 4px; padding: .1rem .4rem; }

  /* Status cell */
  .st { font-weight: 600; text-transform: capitalize; }
  .st-run { color: var(--c-success); }
  .st-off { color: var(--pico-muted-color); }
  .st-mid { color: var(--c-change); }
  .st-err { color: var(--c-danger); }
  .st-pending { color: var(--pico-muted-color); font-style: italic; font-weight: 400; }
  .st-sub { font-size: .74rem; color: var(--pico-muted-color); font-family: var(--mono); }

  /* Combobox: type-to-filter input with a focus-to-show-all dropdown list. */
  .combobox { position: relative; }
  .combobox > input[type="text"] { width: 100%; cursor: pointer; }
  .combobox-list {
    position: absolute; top: calc(100% + 2px); left: 0; right: 0;
    list-style: none; margin: 0; padding: .25rem 0;
    background: var(--pico-card-background-color, #fff);
    border: 1px solid var(--pico-muted-border-color);
    border-radius: var(--pico-border-radius);
    max-height: 14rem; overflow-y: auto; z-index: 10;
    box-shadow: 0 4px 12px rgba(0,0,0,.08);
  }
  .combobox-list li { padding: .35rem .7rem; cursor: pointer; font-size: .85rem; white-space: nowrap; }
  .combobox-list li:hover { background: var(--pico-secondary-background, rgba(0,0,0,.06)); }
  .combobox-list li.active { background: var(--pico-primary, #2563eb); color: var(--pico-primary-inverse, white); }
  .combobox-list li .opt-spec { color: var(--pico-muted-color); font-size: .85em; }
  .combobox-list li.active .opt-spec { color: rgba(255,255,255,.8); }

  pre {
    font: 12.5px/1.45 var(--mono);
    background: var(--pico-card-background-color, #fff);
    color: var(--pico-color);
    border: 1px solid var(--pico-muted-border-color);
    border-radius: var(--pico-border-radius);
    padding: .75rem 1rem; margin: 0;
    white-space: pre-wrap; word-break: break-word;
    max-height: 340px; overflow: auto;
  }
  pre.empty { color: var(--pico-muted-color); font-style: italic; }
  pre.error { border-color: var(--c-danger); }
  dialog fieldset { margin: .75rem 0; }
  dialog label { display: block; margin-bottom: .5rem; }
</style>
</head>
<body>

<main class="container">

<div style="display:flex; align-items:baseline; justify-content:space-between; gap:1rem; flex-wrap:wrap;">
  <h1>EC2 Control Panel</h1>
  <span id="whoami" hidden style="font-size:.85rem; color:var(--pico-muted-color); display:flex; align-items:center; gap:.5rem; flex-wrap:wrap;">
    <span id="whoami-user"></span>
    <span id="viewas-box" hidden style="display:flex; align-items:center; gap:.35rem;">
      <input id="viewas-input" list="users-datalist" type="text" placeholder="view as user or email"
             autocomplete="off" spellcheck="false"
             style="margin:0; padding:.2rem .4rem; font-size:.8rem; height:1.9rem; width:14rem;">
      <datalist id="users-datalist"></datalist>
      <button id="viewas-go" class="secondary outline" style="padding:.2rem .5rem; font-size:.8rem;">View as</button>
      <input id="adduser-input" type="text" placeholder="register user / email" autocomplete="off" spellcheck="false"
             style="margin:0; padding:.2rem .4rem; font-size:.8rem; height:1.9rem; width:12rem;">
      <button id="adduser-go" class="secondary outline" style="padding:.2rem .5rem; font-size:.8rem;">Add user</button>
    </span>
    <a id="logout" href="#">Log out</a>
  </span>
</div>

<div id="viewas-banner" hidden style="margin-bottom:1rem; padding:.5rem .75rem; border-radius:6px;
     background:#fef3c7; border:1px solid #fcd34d; color:#92400e; font-size:.85rem;
     display:flex; align-items:center; gap:.75rem;">
  <span>Viewing as <strong id="viewas-who"></strong> — the page shows exactly what they see.</span>
  <button id="viewas-exit" class="secondary" style="padding:.15rem .5rem; font-size:.8rem;">Exit</button>
</div>

<article>
  <header>
    <strong>Instances</strong>
    <span style="display:flex; gap:.5rem;">
      <button id="new-instance" class="secondary outline" title="Add a new instance">+ New</button>
      <button id="refresh" class="secondary outline icon" aria-label="Refresh status" title="Refresh status">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
          <path d="M21 3v5h-5"/>
          <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
          <path d="M8 16H3v5"/>
        </svg>
      </button>
    </span>
  </header>
  <div style="overflow-x:auto;">
    <table>
      <thead id="thead">
        <tr>
          <th data-sort="name">Instance</th>
          <th data-sort="state">State</th>
          <th data-sort="type">Instance type</th>
          <th data-sort="price" title="Approximate hourly price. Sorts by the rate matching each row's request type.">≈ $/hr</th>
          <th data-sort="runtime" title="Time since launch">Run time</th>
          <th data-sort="total" title="Approximate cost accrued since launch">≈ total</th>
          <th data-sort="req">Request type</th>
          <th data-sort="az">AZ</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <p id="empty-msg" class="empty" style="color:var(--pico-muted-color); font-style:italic; margin-top:.75rem;" hidden>No instances.</p>
</article>

<article>
  <header><strong>Progress</strong></header>
  <pre id="progress" class="empty">No operation in progress.</pre>
</article>

</main>

<dialog id="edit-dialog">
  <article style="margin:0;">
    <header><strong>Edit <span id="ed-name"></span></strong></header>
    <label>Owner <small>(free-form label shown under the name)</small>
      <input id="ed-owner" type="text" placeholder="e.g. Alice" autocomplete="off" spellcheck="false">
    </label>
    <fieldset>
      <legend style="font-size:.85rem; color:var(--pico-muted-color);">Visible to</legend>
      <label><input type="radio" name="ed-vis" value="admins"> Admins only</label>
      <label><input type="radio" name="ed-vis" value="users"> Specific users</label>
      <label><input type="radio" name="ed-vis" value="all"> Everyone (all signed-in users)</label>
    </fieldset>
    <label id="ed-users-wrap" hidden>Users <small>(ctrl/cmd-click for several)</small>
      <select id="ed-users" multiple size="6"></select>
    </label>
    <footer style="display:flex; gap:.5rem; justify-content:flex-end;">
      <button id="ed-cancel" class="secondary" type="button">Cancel</button>
      <button id="ed-save" type="button">Save</button>
    </footer>
  </article>
</dialog>

<dialog id="new-dialog">
  <article style="margin:0;">
    <header><strong>New instance</strong></header>
    <label>Name
      <input id="ni-name" type="text" placeholder="instance name" autocomplete="off" spellcheck="false">
    </label>
    <fieldset>
      <legend style="font-size:.85rem; color:var(--pico-muted-color);">Visible to</legend>
      <label><input type="radio" name="ni-vis" value="me" checked> Only me</label>
      <label><input type="radio" name="ni-vis" value="users"> Specific users</label>
      <label><input type="radio" name="ni-vis" value="all"> Everyone (all signed-in users)</label>
    </fieldset>
    <label id="ni-users-wrap" hidden>Users <small>(ctrl/cmd-click for several)</small>
      <select id="ni-users" multiple size="6"></select>
    </label>
    <footer style="display:flex; gap:.5rem; justify-content:flex-end;">
      <button id="ni-cancel" class="secondary" type="button">Cancel</button>
      <button id="ni-create" type="button">Create</button>
    </footer>
  </article>
</dialog>

<script>
const $ = (id) => document.getElementById(id);
const escapeHtml = (s) => String(s).replace(/[&<>"']/g, (c) =>
  ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

const showError = (msg) => { els.progress.textContent = msg; els.progress.className = "error"; };
const appendError = (msg) => { els.progress.textContent += msg; els.progress.className = "error"; };

const els = {
  tbody: $("tbody"),
  thead: $("thead"),
  emptyMsg: $("empty-msg"),
  progress: $("progress"),
  newInstance: $("new-instance"),
  refresh: $("refresh"),
  whoami: $("whoami"),
  whoamiUser: $("whoami-user"),
  logout: $("logout"),
  viewasBox: $("viewas-box"),
  viewasInput: $("viewas-input"),
  viewasGo: $("viewas-go"),
  viewasBanner: $("viewas-banner"),
  viewasWho: $("viewas-who"),
  viewasExit: $("viewas-exit"),
  usersDatalist: $("users-datalist"),
  addUserInput: $("adduser-input"),
  addUserGo: $("adduser-go"),
  dialog: $("new-dialog"),
  editDialog: $("edit-dialog"),
  edName: $("ed-name"),
  edOwner: $("ed-owner"),
  edUsers: $("ed-users"),
  edUsersWrap: $("ed-users-wrap"),
  edSave: $("ed-save"),
  edCancel: $("ed-cancel"),
  niName: $("ni-name"),
  niUsers: $("ni-users"),
  niUsersWrap: $("ni-users-wrap"),
  niCreate: $("ni-create"),
  niCancel: $("ni-cancel"),
};

let envConfig = null;
let whoami = { authEnabled: false, user: "", isAdmin: false, logoutUrl: "" };
let typesByAz = {};          // az -> [{name, vCpus, memoryMiB, gpus}]
let azList = [];             // availability zones offered by the region
let knownUsers = [];         // registered users, for the reader/view-as pickers
const rows = new Map();      // name -> row controller

// ---- helpers ----
const formatGiB = (mib, forceInt) =>
  `${(mib / 1024).toFixed(!forceInt && mib % 1024 ? 1 : 0)} GiB`;

function formatInstanceInfo(info) {
  const parts = [];
  if (info.vCpus)     parts.push(`${info.vCpus} vCPU`);
  if (info.memoryMiB) parts.push(formatGiB(info.memoryMiB));
  if (info.gpus && info.gpus.length) {
    const g = info.gpus[0];
    const mem = g.memoryMiB ? ` (${formatGiB(g.memoryMiB, true)})` : "";
    parts.push(`GPU ${g.count}× ${g.name}${mem}`);
  }
  return parts.join(" · ");
}

function resolveBaseline(cfg) {
  return {
    type:    (cfg && cfg.instanceType)     || (envConfig && envConfig.defaultInstanceType) || "",
    request: (cfg && cfg.requestType)      || (envConfig && envConfig.defaultRequestType)  || "spot",
    az:      (cfg && cfg.availabilityZone) || (envConfig && envConfig.availabilityZone)     || "",
  };
}

async function ensureTypes(az) {
  if (!az || typesByAz[az]) return;
  try {
    const r = await fetch(`/api/instance-types?az=${encodeURIComponent(az)}`);
    const data = await r.json();
    typesByAz[az] = data.types || [];
  } catch (e) { typesByAz[az] = []; }
}

// setupCombobox wires an <input> + <ul> into a type-to-filter dropdown.
function setupCombobox(input, list, opts) {
  let activeIdx = -1, items = [];
  const render = (filter) => {
    items = opts.getOptions().filter(o => opts.match(o, filter || ""));
    list.innerHTML = items.map(o => `<li role="option">${opts.label(o)}</li>`).join("");
    activeIdx = -1;
  };
  const open = (filter) => { render(filter); list.hidden = false; };
  const close = () => { list.hidden = true; activeIdx = -1; paintActive(); };
  const paintActive = () => {
    [...list.children].forEach((li, i) => li.classList.toggle("active", i === activeIdx));
    if (activeIdx >= 0) list.children[activeIdx].scrollIntoView({ block: "nearest" });
  };
  const commit = (item) => { input.value = opts.value(item); close(); input.dispatchEvent(new Event("change", { bubbles: true })); };
  input.addEventListener("focus", () => open(""));
  input.addEventListener("click", () => input.select());
  input.addEventListener("input", () => open(input.value));
  input.addEventListener("keydown", (e) => {
    if (e.key === "ArrowDown") { if (list.hidden) open(input.value); const n = items.length; if (n) activeIdx = activeIdx < n - 1 ? activeIdx + 1 : 0; paintActive(); e.preventDefault(); }
    else if (e.key === "ArrowUp") { if (list.hidden) open(input.value); const n = items.length; if (n) activeIdx = activeIdx > 0 ? activeIdx - 1 : n - 1; paintActive(); e.preventDefault(); }
    else if (e.key === "Enter") { if (list.hidden) return; let idx = activeIdx; if (idx < 0 && items.length === 1) idx = 0; if (idx >= 0) { commit(items[idx]); e.preventDefault(); } }
    else if (e.key === "Escape") { close(); }
  });
  list.addEventListener("mousedown", (e) => { const li = e.target.closest("li"); if (!li) return; e.preventDefault(); const idx = [...list.children].indexOf(li); if (idx >= 0) commit(items[idx]); });
  document.addEventListener("click", (e) => { if (!input.parentElement.contains(e.target)) close(); });
}

// ---- auth header ----
async function loadWhoami() {
  try {
    const r = await fetch("/api/whoami");
    if (!r.ok) return;
    whoami = await r.json();
    if (whoami.authEnabled && whoami.user) {
      const real = whoami.realUser || whoami.user;
      els.whoamiUser.textContent = "Signed in as " + real + (whoami.realIsAdmin ? " (admin)" : "");
      if (whoami.logoutUrl) els.logout.href = whoami.logoutUrl;
      els.whoami.hidden = false;
      els.viewasBox.hidden = !whoami.realIsAdmin;   // impersonation + user admin are admin-only
      if (whoami.viewingAs) {
        els.viewasWho.textContent = whoami.viewingAs;
        els.viewasInput.value = whoami.viewingAs;
        els.viewasBanner.hidden = false;
      } else {
        els.viewasBanner.hidden = true;
      }
    }
  } catch (e) { /* best-effort */ }
}

// ---- table ----
async function loadAll() {
  try {
    const [instRes, cfgRes, azRes] = await Promise.all([
      fetch("/api/instances"), fetch("/api/config"), fetch("/api/azs"),
    ]);
    envConfig = await cfgRes.json();
    azList = azRes.ok ? ((await azRes.json()).azs || []) : [];
    const list = (await instRes.json()).instances || [];
    await buildTable(list);
  } catch (e) {
    showError("Failed to load instances: " + e);
  }
}

// Rows render first; the type lists, statuses and prices stream in afterwards
// (the server pre-warms those caches at startup, so they usually land at once).
function buildTable(list) {
  els.tbody.innerHTML = "";
  rows.clear();
  els.emptyMsg.hidden = list.length > 0;
  for (const inst of list) els.tbody.appendChild(makeRow(inst));
  fetchStatuses();
  for (const az of new Set(list.map(i => resolveBaseline(i).az))) ensureTypes(az);
  for (const ctrl of rows.values()) fetchPrice(ctrl);
}

// ---- pricing (approximate current spot price for type + AZ) ----
const priceCache = {};

// priceFor returns {spot, onDemand} for TYPE in AZ, fetching once.
async function priceFor(t, az) {
  if (!t || !az) return null;
  const key = t + "|" + az;
  if (key in priceCache) return priceCache[key];
  try {
    const r = await fetch(`/api/price?type=${encodeURIComponent(t)}&az=${encodeURIComponent(az)}`);
    priceCache[key] = r.ok ? await r.json() : null;
  } catch (e) {
    priceCache[key] = null;
  }
  return priceCache[key];
}

const fmtUSD = (v) => { const n = parseFloat(v); return isNaN(n) ? null : "$" + n.toFixed(3); };

// The purchase model that actually applies to a row: what the instance is
// running as, or — when nothing is running — what it would launch as.
function effectiveModel(ctrl) {
  const st = ctrl.st;
  if (st && st.state === "running" && st.lifecycle) {
    return st.lifecycle.toLowerCase() === "spot" ? "spot" : "ondemand";
  }
  return ctrl.reqSelect.value === "spot" ? "spot" : "ondemand";
}

function paintPrice(ctrl) {
  const p = ctrl.prices, model = effectiveModel(ctrl);
  const v = p ? fmtUSD(model === "spot" ? p.spot : p.onDemand) : null;
  const label = model === "spot" ? "spot" : "on-dem";
  if (!v) {
    ctrl.priceCell.textContent = "—";
    ctrl.priceCell.title = `no ${label} price available`;
    return;
  }
  ctrl.priceCell.innerHTML = `${escapeHtml(v)}<div class="st-sub">${label}</div>`;
  ctrl.priceCell.title = `approx ${label} price per hour`;
}

function renderPrice(ctrl, p) {
  ctrl.prices = p;
  paintPrice(ctrl);
}

async function fetchPrice(ctrl) {
  const t = ctrl.typeInput.value.trim(), az = ctrl.azInput.value.trim();
  if (!t || !az) { renderPrice(ctrl, null); return; }
  const key = t + "|" + az;
  ctrl.priceKey = key;                       // guards against out-of-order replies
  if (!(key in priceCache)) ctrl.priceCell.textContent = "…";
  const p = await priceFor(t, az);
  if (ctrl.priceKey === key) renderPrice(ctrl, p);
}

function formatDuration(ms) {
  const s = Math.floor(ms / 1000);
  const d = Math.floor(s / 86400), h = Math.floor((s % 86400) / 3600), m = Math.floor((s % 3600) / 60);
  if (d) return `${d}d ${h}h`;
  if (h) return `${h}h ${m}m`;
  return `${m}m`;
}

// Run time since launch plus the cost accrued over it, priced at the *running*
// instance type (which may differ from a pending override in the type column).
async function renderRuntime(ctrl, st) {
  const cell = ctrl.runtimeCell, tc = ctrl.totalCell;
  ctrl.runtimeMs = NaN;
  ctrl.totalValue = NaN;
  if (!st || !st.launchTime || st.state !== "running") {
    cell.textContent = "—"; cell.title = ""; tc.textContent = "—";
    return;
  }
  const ms = Date.now() - new Date(st.launchTime).getTime();
  if (!(ms > 0)) { cell.textContent = "—"; tc.textContent = "—"; return; }
  ctrl.runtimeMs = ms;
  cell.textContent = formatDuration(ms);
  cell.title = "since " + new Date(st.launchTime).toLocaleString();

  const p = await priceFor(st.instanceType || ctrl.typeInput.value.trim(), ctrl.azInput.value.trim());
  const spot = effectiveModel(ctrl) === "spot";
  const total = parseFloat(p ? (spot ? p.spot : p.onDemand) : NaN) * (ms / 3600000);
  if (isNaN(total)) { tc.textContent = "—"; return; }
  ctrl.totalValue = total;
  tc.innerHTML = `≈ $${total.toFixed(2)}<div class="st-sub">${spot ? "spot" : "on-dem"}</div>`;
}

// Amber-highlights each field that differs from the last-applied baseline and
// toggles the row's "restart to apply" badge.
function recomputeChanged(ctrl) {
  const t = ctrl.typeInput.value.trim() !== ctrl.baseType;
  const r = ctrl.reqSelect.value !== ctrl.baseRequest;
  const a = ctrl.azInput.value.trim() !== ctrl.baseAz;
  ctrl.typeInput.classList.toggle("changed", t);
  ctrl.reqSelect.classList.toggle("changed", r);
  ctrl.azInput.classList.toggle("changed", a);
  ctrl.badge.hidden = !(t || r || a);
}

function makeRow(inst) {
  const base = resolveBaseline(inst);
  const tr = document.createElement("tr");
  tr.innerHTML = `
    <td class="c-name"></td>
    <td class="c-state"><span class="st st-pending">…</span></td>
    <td class="c-type"><div class="combobox"><input type="text" class="type-input" autocomplete="off" spellcheck="false"><ul class="combobox-list" role="listbox" hidden></ul></div></td>
    <td class="c-price">…</td>
    <td class="c-runtime">—</td>
    <td class="c-total">—</td>
    <td class="c-req"><select class="req-select"><option value="spot">spot</option><option value="ondemand">ondemand</option></select></td>
    <td class="c-az"><select class="az-input"></select></td>
    <td class="c-act">
      <span class="badge" hidden>⟳ restart to apply</span>
      <div class="act-btns">
        <button class="act success" data-a="start">Start</button>
        <button class="act" data-a="restart">Restart</button>
        <button class="act danger" data-a="stop">Stop</button>
        <button class="act edit-btn secondary outline" title="Edit owner / visibility" hidden>Edit</button>
      </div>
    </td>`;

  const nameCell = tr.querySelector(".c-name");
  nameCell.innerHTML = `<span class="inst-name"></span>`;
  nameCell.querySelector(".inst-name").textContent = inst.name;
  if (inst.owner) { const o = document.createElement("span"); o.className = "inst-owner"; o.textContent = inst.owner; nameCell.appendChild(o); }

  const typeInput = tr.querySelector(".type-input");
  const typeList  = tr.querySelector(".combobox-list");
  const reqSelect = tr.querySelector(".req-select");
  const azInput   = tr.querySelector(".az-input");
  typeInput.value = base.type;
  typeInput.placeholder = base.type ? "" : "default";
  reqSelect.value = (base.request === "ondemand") ? "ondemand" : "spot";
  const azOpts = [...new Set([base.az, ...azList].filter(Boolean))];
  azInput.innerHTML = azOpts.map(a => `<option value="${escapeHtml(a)}">${escapeHtml(a)}</option>`).join("");
  azInput.value = base.az;

  const ctrl = {
    name: inst.name, tr, typeInput, reqSelect, azInput,
    owner: inst.owner || "", readers: inst.readers || [],
    baseType: base.type, baseRequest: reqSelect.value, baseAz: base.az,
    badge: tr.querySelector(".badge"),
    stateCell: tr.querySelector(".c-state"),
    priceCell: tr.querySelector(".c-price"),
    runtimeCell: tr.querySelector(".c-runtime"),
    totalCell: tr.querySelector(".c-total"),
    buttons: [...tr.querySelectorAll("button.act")],
    editBtn: tr.querySelector(".edit-btn"),
  };
  rows.set(inst.name, ctrl);

  setupCombobox(typeInput, typeList, {
    getOptions: () => typesByAz[azInput.value.trim() || base.az] || [],
    match: (i, f) => i.name.toLowerCase().includes(f.toLowerCase()),
    label: (i) => { const spec = formatInstanceInfo(i); const n = escapeHtml(i.name); return spec ? `${n}<span class="opt-spec"> — ${escapeHtml(spec)}</span>` : n; },
    value: (i) => i.name,
  });

  // Re-price on a short debounce so typing doesn't fire a request per keystroke.
  let priceTimer;
  const repriceSoon = () => { clearTimeout(priceTimer); priceTimer = setTimeout(() => fetchPrice(ctrl), 350); };
  const onEdit = () => { recomputeChanged(ctrl); repriceSoon(); };
  typeInput.addEventListener("change", onEdit);
  typeInput.addEventListener("input", onEdit);
  reqSelect.addEventListener("change", () => { recomputeChanged(ctrl); paintPrice(ctrl); });
  azInput.addEventListener("change", () => {
    onEdit();
    ensureTypes(azInput.value.trim());   // the type list is per-AZ
  });

  for (const b of ctrl.buttons) {
    if (b.dataset.a) b.addEventListener("click", () => runRowAction(ctrl, b.dataset.a));
  }
  ctrl.editBtn.addEventListener("click", () => openEdit(ctrl));
  ctrl.editBtn.hidden = !canAdminEdit();
  return tr;
}

// ---- status ----
async function fetchStatuses() {
  els.refresh.classList.add("busy");
  try {
    const r = await fetch("/api/statuses");
    const map = {};
    for (const s of (await r.json()).statuses || []) map[s.name] = s;
    for (const [name, ctrl] of rows) {
      syncTypeToRunning(ctrl, map[name]);
      renderStatus(ctrl, map[name]);
      renderRuntime(ctrl, map[name]);
      paintPrice(ctrl);
    }
    applySort();
  } catch (e) { /* leave cells as-is */ }
  finally { els.refresh.classList.remove("busy"); }
}

// A running instance's actual type is the truth for the type column: adopt it
// as the baseline, so the field shows what is really running and "changed"
// means "differs from the running instance". A pending user edit is preserved.
function syncTypeToRunning(ctrl, st) {
  if (!st || st.state !== "running" || !st.instanceType) return;
  if (ctrl.baseType === st.instanceType) return;
  const untouched = ctrl.typeInput.value.trim() === ctrl.baseType;
  ctrl.baseType = st.instanceType;
  if (untouched) {
    ctrl.typeInput.value = st.instanceType;
    fetchPrice(ctrl);
  }
  recomputeChanged(ctrl);
}

function renderStatus(ctrl, st) {
  ctrl.st = st;
  const cell = ctrl.stateCell;
  if (!st || st.pending) { cell.innerHTML = `<span class="st st-pending">…</span>`; return; }
  if (st.error) { cell.innerHTML = `<span class="st st-err" title="${escapeHtml(st.error)}">error</span>`; return; }
  const state = st.state || "none";
  const off = ["none", "stopped", "terminated"].includes(state);
  const cls = state === "running" ? "st-run" : (off ? "st-off" : "st-mid");
  let html = `<span class="st ${cls}">${escapeHtml(state)}</span>`;
  if (st.ip) html += `<div class="st-sub">${escapeHtml(st.ip)}</div>`;
  if (st.instanceType) html += `<div class="st-sub">${escapeHtml(st.instanceType)}</div>`;
  if (st.lifecycle) html += `<div class="st-sub">${escapeHtml(st.lifecycle)}</div>`;
  cell.innerHTML = html;
}

// ---- sorting ----
let sortKey = null, sortDir = 1;

// Effective hourly rate for a row: the price matching its request type, falling
// back to the other when AWS returned nothing for that purchase model.
function rowRate(ctrl) {
  const p = ctrl.prices;
  if (!p) return NaN;
  const wantSpot = effectiveModel(ctrl) === "spot";
  const primary = parseFloat(wantSpot ? p.spot : p.onDemand);
  const fallback = parseFloat(wantSpot ? p.onDemand : p.spot);
  return isNaN(primary) ? fallback : primary;
}

function sortValue(ctrl, key) {
  switch (key) {
    case "name":    return ctrl.name;
    case "state":   return (ctrl.st && ctrl.st.state) || "";
    case "type":    return ctrl.typeInput.value.trim();
    case "price":   return rowRate(ctrl);
    case "runtime": return ctrl.runtimeMs;
    case "total":   return ctrl.totalValue;
    case "req":     return ctrl.reqSelect.value;
    case "az":      return ctrl.azInput.value.trim();
  }
  return "";
}

const isMissing = (v) => v === "" || v === null || v === undefined || (typeof v === "number" && isNaN(v));

// Reorders the existing <tr> nodes (appendChild moves them), so in-progress
// edits, focus and listeners all survive a sort.
function applySort() {
  if (!sortKey) return;
  const arr = [...rows.values()];
  arr.sort((x, y) => {
    const a = sortValue(x, sortKey), b = sortValue(y, sortKey);
    if (isMissing(a) && isMissing(b)) return 0;
    if (isMissing(a)) return 1;   // blanks last, whichever direction
    if (isMissing(b)) return -1;
    const c = (typeof a === "number" && typeof b === "number")
      ? a - b
      : String(a).localeCompare(String(b), undefined, { numeric: true, sensitivity: "base" });
    return c * sortDir;
  });
  for (const ctrl of arr) els.tbody.appendChild(ctrl.tr);
}

els.thead.addEventListener("click", (e) => {
  const th = e.target.closest("th[data-sort]");
  if (!th) return;
  if (sortKey === th.dataset.sort) sortDir = -sortDir;
  else { sortKey = th.dataset.sort; sortDir = 1; }
  for (const h of els.thead.querySelectorAll("th[data-sort]")) h.classList.remove("sorted-asc", "sorted-desc");
  th.classList.add(sortDir === 1 ? "sorted-asc" : "sorted-desc");
  applySort();
});

// ---- actions ----
function setRowBusy(ctrl, b) {
  for (const el of [...ctrl.buttons, ctrl.typeInput, ctrl.reqSelect, ctrl.azInput]) el.disabled = b;
}

async function streamAppend(target, response) {
  if (!response.ok) target.className = "error";
  const reader = response.body.getReader();
  const dec = new TextDecoder();
  while (true) {
    const { value, done } = await reader.read();
    if (done) break;
    target.textContent += dec.decode(value, { stream: true });
    target.scrollTop = target.scrollHeight;
  }
}

async function runRowAction(ctrl, action) {
  if ((action === "stop" || action === "restart") && !confirm(`${action} ${ctrl.name}?`)) return;
  const q = new URLSearchParams();
  if (action !== "stop") {
    if (ctrl.typeInput.value.trim()) q.set("instanceType", ctrl.typeInput.value.trim());
    if (ctrl.reqSelect.value)        q.set("requestType",  ctrl.reqSelect.value);
    if (ctrl.azInput.value.trim())   q.set("az",           ctrl.azInput.value.trim());
  }
  const url = `/api/${action}/${encodeURIComponent(ctrl.name)}${q.toString() ? "?" + q : ""}`;
  setRowBusy(ctrl, true);
  els.progress.className = "";
  els.progress.textContent = `${action} ${ctrl.name} — submitting…\n\n`;
  try {
    const resp = await fetch(url, { method: "POST" });
    const body = await resp.json().catch(() => ({}));
    if (!resp.ok) {
      showError(body.error || `${resp.status} ${resp.statusText}`);
      return;
    }
    els.progress.textContent = `Task ${body.taskId} (${action} ${ctrl.name}) submitted.\n\n`;
    const stream = await fetch(`/api/tasks/${body.taskId}/stream`);
    await streamAppend(els.progress, stream);
    if (action !== "stop") {   // overrides are now applied — reset baseline, clear highlight
      ctrl.baseType = ctrl.typeInput.value.trim();
      ctrl.baseRequest = ctrl.reqSelect.value;
      ctrl.baseAz = ctrl.azInput.value.trim();
      recomputeChanged(ctrl);
    }
    await fetchStatuses();
  } catch (e) {
    appendError("\nERROR: " + e);
  } finally {
    setRowBusy(ctrl, false);
  }
}

// ---- known users ----
// Registered users (anyone who has signed in, plus admin-added ones) back every
// user picker, so access is granted by selection instead of typed guesswork.
async function loadUsers() {
  try {
    const r = await fetch("/api/users");
    knownUsers = r.ok ? ((await r.json()).users || []).map(u => u.username) : [];
  } catch (e) {
    knownUsers = [];
  }
  els.usersDatalist.innerHTML = knownUsers.map(u => `<option value="${escapeHtml(u)}"></option>`).join("");
}

// Fills a <select multiple> with the known users, preserving any already-set
// values that aren't registered yet so editing can't silently drop them.
function fillUserSelect(sel, selected) {
  const chosen = selected || [];
  const opts = [...new Set([...knownUsers, ...chosen])].sort();
  sel.innerHTML = opts
    .map(u => `<option value="${escapeHtml(u)}"${chosen.includes(u) ? " selected" : ""}>${escapeHtml(u)}</option>`)
    .join("");
}

const selectedUsers = (sel) => [...sel.selectedOptions].map(o => o.value);

async function addUser(name) {
  if (!name) return;
  try {
    const r = await fetch("/api/users", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ user: name }),
    });
    if (!r.ok) {
      showError("Add user failed: " + ((await r.text().catch(() => "")).trim() || r.status));
      return;
    }
    els.addUserInput.value = "";
    await loadUsers();
  } catch (e) {
    showError("Add user failed: " + e);
  }
}

// ---- admin: edit owner / visibility ----
// Hidden while impersonating so the "view as" page stays faithful to what that
// user would actually see.
function canAdminEdit() {
  if (!whoami.authEnabled) return true;          // unauthenticated dev mode
  return !!whoami.realIsAdmin && !whoami.viewingAs;
}

let editing = null;

function openEdit(ctrl) {
  editing = ctrl;
  els.edName.textContent = ctrl.name;
  els.edOwner.value = ctrl.owner || "";
  const readers = ctrl.readers || [];
  const vis = readers.includes("*") ? "all" : (readers.length ? "users" : "admins");
  els.editDialog.querySelector(`input[name="ed-vis"][value="${vis}"]`).checked = true;
  fillUserSelect(els.edUsers, readers.filter(x => x !== "*"));
  els.edUsersWrap.hidden = vis !== "users";
  els.editDialog.showModal();
}

async function saveEdit() {
  if (!editing) return;
  const sel = els.editDialog.querySelector('input[name="ed-vis"]:checked');
  const vis = sel ? sel.value : "all";
  // "" (admins only) / explicit user list / "*" (everyone)
  const readers = vis === "users"
    ? selectedUsers(els.edUsers)
    : (vis === "all" ? ["*"] : []);
  const name = editing.name;
  els.editDialog.close();
  try {
    const r = await fetch(`/api/instances/${encodeURIComponent(name)}`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ owner: els.edOwner.value.trim(), readers }),
    });
    if (!r.ok) {
      showError("Update failed: " + ((await r.text().catch(() => "")).trim() || r.status));
      return;
    }
    await loadAll();
  } catch (e) {
    showError("Update failed: " + e);
  }
}

// ---- new-instance dialog ----
function createInstance() {
  els.niName.value = "";
  fillUserSelect(els.niUsers, []);
  const me = els.dialog.querySelector('input[name="ni-vis"][value="me"]'); if (me) me.checked = true;
  els.niUsersWrap.hidden = true;
  els.dialog.showModal(); els.niName.focus();
}
function selectedVisibility() {
  const el = els.dialog.querySelector('input[name="ni-vis"]:checked');
  return el ? el.value : "me";
}
async function submitNewInstance() {
  const name = els.niName.value.trim();
  if (!name) { els.niName.focus(); return; }
  const vis = selectedVisibility();
  let readers = [];
  if (vis === "me") readers = whoami.user ? [whoami.user] : [];
  else if (vis === "users") readers = selectedUsers(els.niUsers);
  else readers = ["*"];   // "Everyone" is explicit — an empty list means admins only
  els.dialog.close();
  try {
    const r = await fetch("/api/instances", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ name, readers }) });
    if (!r.ok) {
      const msg = (await r.text().catch(() => "")).trim();
      showError("Failed to add instance: " + (msg || `${r.status} ${r.statusText}`));
      return;
    }
    await loadAll();
  } catch (e) {
    showError("Failed to add instance: " + e);
  }
}

// Impersonation (admin only). Empty name clears it. The server re-checks that
// the real session user is an admin, so this can never grant extra access.
async function setViewAs(name) {
  try {
    const r = await fetch("/api/view-as", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ user: name }),
    });
    if (!r.ok) {
      showError("View-as failed: " + ((await r.text().catch(() => "")).trim() || r.status));
      return;
    }
    await loadWhoami();
    await loadAll();
  } catch (e) {
    showError("View-as failed: " + e);
  }
}

// ---- wiring ----
els.addUserGo.addEventListener("click", () => addUser(els.addUserInput.value.trim()));
els.addUserInput.addEventListener("keydown", (e) => { if (e.key === "Enter") addUser(els.addUserInput.value.trim()); });
els.viewasGo.addEventListener("click", () => setViewAs(els.viewasInput.value.trim()));
els.viewasInput.addEventListener("keydown", (e) => { if (e.key === "Enter") setViewAs(els.viewasInput.value.trim()); });
els.viewasExit.addEventListener("click", () => setViewAs(""));
els.edSave.addEventListener("click", saveEdit);
els.edCancel.addEventListener("click", () => els.editDialog.close());
els.editDialog.addEventListener("change", (e) => {
  if (e.target.name === "ed-vis") {
    els.edUsersWrap.hidden = els.editDialog.querySelector('input[name="ed-vis"]:checked').value !== "users";
  }
});
els.newInstance.addEventListener("click", createInstance);
els.niCreate.addEventListener("click", submitNewInstance);
els.niCancel.addEventListener("click", () => els.dialog.close());
els.dialog.addEventListener("change", (e) => { if (e.target.name === "ni-vis") els.niUsersWrap.hidden = selectedVisibility() !== "users"; });
els.refresh.addEventListener("click", fetchStatuses);

loadWhoami().then(() => Promise.all([loadUsers(), loadAll()]));
// Poll statuses so a cold server cache (right after a deploy) fills in on its
// own, and run time / state stay current without a manual refresh.
setInterval(fetchStatuses, 20000);
</script>
</body>
</html>
