<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EC2 Control Panel</title>
<link rel="stylesheet" href="/assets/pico.min.css">
<style>
  /* Custom styles layered on top of Pico defaults. */
  :root {
    --c-success: #16a34a;
    --c-danger:  #dc2626;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  main.container { max-width: 1100px; padding-block: 1.5rem; }
  h1 { font-size: 1.4rem; margin-bottom: 1rem; }
  article { padding: 1rem 1.25rem; margin-bottom: 1rem; }
  article > header { margin-bottom: .75rem; padding-block: 0; }
  .row { display: flex; gap: .75rem; align-items: end; flex-wrap: wrap; margin-bottom: 0; }
  .row > label { display: flex; flex-direction: column; font-size: .8125rem; color: var(--pico-muted-color); margin-bottom: 0; }
  .row > label > input,
  .row > label > select { margin: 0; }
  .row > label.inline { flex-direction: row; align-items: center; gap: .35rem; }
  .row select, .row input[type="text"], .row input:not([type]) { width: auto; min-width: 9rem; margin: 0; }
  /* Pin direct-child controls to the same height so selects, inputs, buttons
     and icon buttons line up in the Instance + Actions rows. */
  .row > select, .row > input, .row > button, .row > .combobox {
    min-height: calc(var(--pico-line-height) * 1em + var(--pico-form-element-spacing-vertical) * 2 + var(--pico-border-width) * 2);
  }
  /* Combobox: type-to-filter input with a focus-to-show-all dropdown list. */
  .combobox { position: relative; flex: 1; min-width: 0; }
  .combobox > input[type="text"] { width: 100%; min-width: 0; margin: 0; cursor: pointer; }
  .combobox-list {
    position: absolute; top: calc(100% + 2px); left: 0; right: 0;
    list-style: none; margin: 0; padding: .25rem 0;
    background: var(--pico-card-background-color, #fff);
    border: 1px solid var(--pico-muted-border-color);
    border-radius: var(--pico-border-radius);
    max-height: 14rem; overflow-y: auto; z-index: 10;
    box-shadow: 0 4px 12px rgba(0,0,0,.08);
  }
  .combobox-list li {
    padding: .35rem .9rem;
    cursor: pointer;
    font-size: .9rem;
  }
  .combobox-list li.active,
  .combobox-list li:hover {
    background: var(--pico-secondary-background, rgba(0,0,0,.05));
  }
  /* Variant buttons — Pico ships with primary/secondary/contrast; we add success/danger. */
  button.success { --pico-background-color: var(--c-success); --pico-border-color: var(--c-success); --pico-color: white; }
  button.success:hover:not(:disabled) { --pico-background-hover: #15803d; --pico-border-hover: #15803d; }
  button.danger  { --pico-background-color: var(--c-danger);  --pico-border-color: var(--c-danger);  --pico-color: white; }
  button.danger:hover:not(:disabled)  { --pico-background-hover: #b91c1c; --pico-border-hover: #b91c1c; }
  button { margin: 0; }
  /* Icon button keeps Pico's default padding and line-height so its height
     matches text-only buttons. SVG sizes to 1em so it aligns with text. */
  button.icon { display: inline-flex; align-items: center; justify-content: center; }
  button.icon svg { display: block; width: 1em; height: 1em; }
  /* Free-text output panes (not Pico's <pre><code> code-block style). */
  pre {
    font: 12.5px/1.45 var(--mono);
    background: var(--pico-card-background-color, #fff);
    color: var(--pico-color);
    border: 1px solid var(--pico-muted-border-color);
    border-radius: var(--pico-border-radius);
    padding: .75rem 1rem;
    margin: 0;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 380px;
    overflow: auto;
  }
  pre.empty { color: var(--pico-muted-color); font-style: italic; }
  pre.error { border-color: var(--c-danger); }
  /* When busy, spin the refresh button's own icon — no separate spinner element,
     no reserved row space. */
  button.icon.busy svg { animation: spin .8s linear infinite; color: var(--pico-primary, #2563eb); }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<main class="container">

<h1>EC2 Control Panel</h1>

<article>
  <header><strong>Instance</strong></header>
  <div class="row">
    <div class="combobox">
      <input id="instance" type="text" placeholder="type to filter…" autocomplete="off" spellcheck="false">
      <ul id="instance-options" class="combobox-list" role="listbox" hidden></ul>
    </div>
    <button id="refresh" class="secondary outline icon" aria-label="Refresh status" title="Refresh status" style="margin-left: auto;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
        <path d="M21 3v5h-5"/>
        <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
        <path d="M8 16H3v5"/>
      </svg>
    </button>
  </div>
  <pre id="status" class="empty" style="margin-top: .75rem;">Pick an instance.</pre>
</article>

<article>
  <details>
    <summary><strong>Overrides</strong> <small>(optional)</small></summary>
    <div class="row" style="margin-top: 1rem;">
      <label>Instance type
        <select id="instance-type"></select>
      </label>
      <label>Request type
        <select id="request-type">
          <option value=""></option>
          <option value="spot">spot</option>
          <option value="ondemand">ondemand</option>
        </select>
      </label>
      <label>AZ
        <input id="az" type="text">
      </label>
      <label>Bid price
        <input id="bid-price" type="text">
      </label>
      <label class="inline">
        <input type="checkbox" id="force"> --force
      </label>
    </div>
  </details>
</article>

<article>
  <header><strong>Actions</strong></header>
  <div class="row">
    <button id="start"   class="success">Start</button>
    <button id="restart">Restart</button>
    <button id="stop"    class="danger">Stop</button>
  </div>
  <pre id="progress" class="empty" style="margin-top: .75rem;">No operation in progress.</pre>
</article>

</main>

<script>
const $ = (id) => document.getElementById(id);
const els = {
  instance: $("instance"),
  refresh: $("refresh"),
  status: $("status"),
  progress: $("progress"),
  start: $("start"),
  stop: $("stop"),
  restart: $("restart"),
  force: $("force"),
  instanceType: $("instance-type"),
  requestType: $("request-type"),
  az: $("az"),
  bidPrice: $("bid-price"),
};

function setBusy(b) {
  els.refresh.classList.toggle("busy", b);
  for (const id of ["start","stop","restart","refresh","instance"]) els[id].disabled = b;
}

let envConfig = null;
let instanceConfigs = {}; // name → {availabilityZone?, instanceType?, requestType?, ...}

// Per-field "what would we use if the user leaves the override blank".
function resolveDefaults() {
  const inst = instanceConfigs[els.instance.value] || {};
  return {
    availabilityZone: inst.availabilityZone || (envConfig && envConfig.availabilityZone) || "",
    instanceType:     inst.instanceType     || (envConfig && envConfig.defaultInstanceType) || "",
    requestType:      inst.requestType      || (envConfig && envConfig.defaultRequestType)  || "",
    bidPrice:         (envConfig && envConfig.defaultBidPrice) || "",
  };
}

function paintDefaults() {
  const d = resolveDefaults();
  els.az.placeholder = d.availabilityZone;
  els.bidPrice.placeholder = d.bidPrice;
  const itEmpty = els.instanceType.querySelector('option[value=""]');
  if (itEmpty) itEmpty.textContent = d.instanceType ? `(default: ${d.instanceType})` : "(default)";
  const rtEmpty = els.requestType.querySelector('option[value=""]');
  if (rtEmpty) rtEmpty.textContent = d.requestType ? `(default: ${d.requestType})` : "(default)";
}

async function loadInstances() {
  try {
    const [instRes, cfgRes] = await Promise.all([
      fetch("/api/instances"),
      fetch("/api/config"),
    ]);
    envConfig = await cfgRes.json();
    const data = await instRes.json();
    const list = data.instances || [];
    instanceConfigs = Object.fromEntries(list.map(i => [i.name, i]));
    if (list.length) {
      els.instance.value = list[0].name;
      paintDefaults();
      await loadInstanceTypes();
      await refreshStatus();
      await reattachIfRunning();
    } else {
      paintDefaults();
      await loadInstanceTypes();
    }
  } catch (e) {
    els.status.textContent = "Failed to load instances: " + e;
    els.status.className = "error";
  }
}

async function loadInstanceTypes() {
  const az = els.az.value || resolveDefaults().availabilityZone;
  const sel = els.instanceType;
  const previous = sel.value;
  sel.innerHTML = `<option value=""></option><option disabled>loading…</option>`;
  paintDefaults();
  try {
    const r = await fetch(`/api/instance-types?az=${encodeURIComponent(az)}`);
    const data = await r.json();
    const types = data.types || [];
    sel.innerHTML =
      `<option value=""></option>` +
      types.map(t => `<option value="${t}">${t}</option>`).join("");
    if (previous && types.includes(previous)) sel.value = previous;
    paintDefaults();
  } catch (e) {
    sel.innerHTML = `<option value=""></option><option disabled>(load failed)</option>`;
    paintDefaults();
  }
}

function buildQuery() {
  const q = new URLSearchParams();
  if (els.instanceType.value) q.set("instanceType", els.instanceType.value);
  if (els.requestType.value)  q.set("requestType",  els.requestType.value);
  if (els.az.value)           q.set("az",           els.az.value);
  if (els.bidPrice.value)     q.set("bidPrice",     els.bidPrice.value);
  return q;
}

async function streamInto(target, response) {
  target.textContent = "";
  target.className = response.ok ? "" : "error";
  const reader = response.body.getReader();
  const dec = new TextDecoder();
  while (true) {
    const { value, done } = await reader.read();
    if (done) break;
    target.textContent += dec.decode(value, { stream: true });
    target.scrollTop = target.scrollHeight;
  }
}

async function streamAppend(target, response) {
  if (!response.ok) target.className = "error";
  const reader = response.body.getReader();
  const dec = new TextDecoder();
  while (true) {
    const { value, done } = await reader.read();
    if (done) break;
    target.textContent += dec.decode(value, { stream: true });
    target.scrollTop = target.scrollHeight;
  }
}

async function refreshStatus(force = false) {
  const id = els.instance.value;
  if (!id) return;
  setBusy(true);
  try {
    const url = `/api/status/${encodeURIComponent(id)}${force ? "?force=true" : ""}`;
    const r = await fetch(url);
    await streamInto(els.status, r);
  } finally {
    setBusy(false);
  }
}

async function runAction(action) {
  const id = els.instance.value;
  if (!id) return;
  if (action === "stop" || action === "restart") {
    if (!confirm(`${action} ${id}?`)) return;
  }
  const q = buildQuery();
  if (action === "stop" && els.force.checked) q.set("force", "true");
  const url = `/api/${action}/${encodeURIComponent(id)}${q.toString() ? "?" + q : ""}`;

  setBusy(true);
  els.progress.className = "";
  els.progress.textContent = "";
  try {
    const submitResp = await fetch(url, { method: "POST" });
    const body = await submitResp.json().catch(() => ({}));
    if (!submitResp.ok) {
      els.progress.textContent = body.error || `${submitResp.status}: ${submitResp.statusText}`;
      els.progress.className = "error";
      return;
    }
    const taskId = body.taskId;
    els.progress.textContent = `Task ${taskId} (${action} ${id}) submitted.\n\n`;
    const stream = await fetch(`/api/tasks/${taskId}/stream`);
    await streamAppend(els.progress, stream);
    await refreshStatus();
  } catch (e) {
    els.progress.textContent += "\nERROR: " + e;
    els.progress.className = "error";
  } finally {
    setBusy(false);
  }
}

async function reattachIfRunning() {
  const id = els.instance.value;
  if (!id) return;
  try {
    const r = await fetch("/api/tasks");
    const data = await r.json();
    const live = (data.tasks || []).find(t =>
      t.sessionId === id && (t.status === "pending" || t.status === "running"));
    if (!live) return;
    setBusy(true);
    els.progress.className = "";
    els.progress.textContent = `Reconnecting to running task ${live.id} (${live.operation})...\n\n`;
    try {
      const stream = await fetch(`/api/tasks/${live.id}/stream`);
      await streamAppend(els.progress, stream);
      await refreshStatus();
    } finally {
      setBusy(false);
    }
  } catch (e) { /* best-effort */ }
}

els.instance.addEventListener("change", async () => {
  // Skip ad-hoc partial input; only act on a known session id.
  if (!instanceConfigs[els.instance.value]) return;
  paintDefaults();
  await loadInstanceTypes();
  await refreshStatus();
  await reattachIfRunning();
});

// Custom combobox: filter on type, full list on focus, keyboard nav.
(function setupCombobox() {
  const input = els.instance;
  const list = document.getElementById("instance-options");
  let activeIdx = -1;

  const allOptions = () => Object.keys(instanceConfigs);
  const render = (filter) => {
    const f = (filter || "").toLowerCase();
    const items = allOptions().filter(o => o.toLowerCase().includes(f));
    list.innerHTML = items.map(o => `<li role="option">${o}</li>`).join("");
    activeIdx = -1;
  };
  const open = (filter) => { render(filter); list.hidden = false; };
  const close = () => { list.hidden = true; activeIdx = -1; paintActive(); };
  const paintActive = () => {
    [...list.children].forEach((li, i) => li.classList.toggle("active", i === activeIdx));
    if (activeIdx >= 0) list.children[activeIdx].scrollIntoView({ block: "nearest" });
  };
  const commit = (value) => {
    input.value = value;
    close();
    input.dispatchEvent(new Event("change", { bubbles: true }));
  };

  input.addEventListener("focus", () => open(""));
  input.addEventListener("click", () => input.select());
  input.addEventListener("input", () => open(input.value));
  input.addEventListener("keydown", (e) => {
    if (e.key === "ArrowDown") {
      if (list.hidden) open("");
      activeIdx = Math.min(activeIdx + 1, list.children.length - 1);
      paintActive();
      e.preventDefault();
    } else if (e.key === "ArrowUp") {
      if (list.hidden) open("");
      activeIdx = Math.max(activeIdx - 1, 0);
      paintActive();
      e.preventDefault();
    } else if (e.key === "Enter") {
      if (list.hidden) return;
      // If exactly one option matches the current filter, treat Enter as selecting it.
      let idx = activeIdx;
      if (idx < 0 && list.children.length === 1) idx = 0;
      if (idx >= 0) {
        commit(list.children[idx].textContent);
        e.preventDefault();
      }
    } else if (e.key === "Escape") {
      close();
    }
  });
  list.addEventListener("mousedown", (e) => {
    const li = e.target.closest("li");
    if (!li) return;
    e.preventDefault();
    commit(li.textContent);
  });
  document.addEventListener("click", (e) => {
    if (!input.parentElement.contains(e.target)) close();
  });
})();
els.refresh.addEventListener("click", () => refreshStatus(true));
let azDebounce;
els.az.addEventListener("input", () => {
  clearTimeout(azDebounce);
  azDebounce = setTimeout(loadInstanceTypes, 400);
});
els.start.addEventListener("click",   () => runAction("start"));
els.restart.addEventListener("click", () => runAction("restart"));
els.stop.addEventListener("click",    () => runAction("stop"));

loadInstances();
</script>
</body>
</html>
