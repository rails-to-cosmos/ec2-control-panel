<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>EC2 Control Panel</title>
<style>
  :root {
    --bg: #1a1a1a;
    --panel: #232323;
    --fg: #e0e0e0;
    --dim: #888;
    --accent: #3b82f6;
    --ok: #22c55e;
    --danger: #ef4444;
    --warn: #f59e0b;
    --border: #333;
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body {
    font: 14px/1.5 system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--fg);
    margin: 0;
    padding: 24px;
    max-width: 1100px;
    margin: auto;
  }
  h1 { font-size: 20px; margin: 0 0 16px; }
  h2 { font-size: 14px; color: var(--dim); margin: 16px 0 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
  label { display: inline-flex; align-items: center; gap: 6px; color: var(--dim); }
  select, input, button {
    background: var(--panel);
    color: var(--fg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 10px;
    font: inherit;
  }
  input { width: 130px; }
  input::placeholder { color: var(--dim); }
  button { cursor: pointer; transition: filter 0.15s; }
  button:hover:not(:disabled) { filter: brightness(1.2); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.primary { background: var(--accent); border-color: var(--accent); color: white; }
  button.success { background: var(--ok); border-color: var(--ok); color: white; }
  button.danger  { background: var(--danger); border-color: var(--danger); color: white; }
  pre {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px;
    margin: 0;
    font: 13px/1.45 var(--mono);
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 400px;
    overflow-y: auto;
  }
  pre.empty { color: var(--dim); font-style: italic; }
  pre.error { border-color: var(--danger); }
  .spinner {
    display: inline-block; width: 12px; height: 12px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite;
    margin-left: 6px; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<h1>EC2 Control Panel</h1>

<div class="row">
  <label>Instance: <select id="instance"></select></label>
  <button id="refresh">Refresh status</button>
  <span id="busy" hidden><span class="spinner"></span></span>
</div>

<h2>Status</h2>
<pre id="status" class="empty">Pick an instance.</pre>

<h2>Overrides (optional)</h2>
<div class="row">
  <label>Instance type:
    <select id="instance-type"></select>
  </label>
  <label>Request type:
    <select id="request-type">
      <option value=""></option>
      <option value="spot">spot</option>
      <option value="ondemand">ondemand</option>
    </select>
  </label>
  <label>AZ: <input id="az"></label>
  <label>Bid price: <input id="bid-price"></label>
</div>

<h2>Actions</h2>
<div class="row">
  <button id="start"   class="success">Start</button>
  <button id="restart" class="primary">Restart</button>
  <button id="stop"    class="danger">Stop</button>
  <label style="margin-left: 12px;"><input type="checkbox" id="force"> --force</label>
</div>

<h2>Progress</h2>
<pre id="progress" class="empty">No operation in progress.</pre>

<script>
const $ = (id) => document.getElementById(id);
const els = {
  instance: $("instance"),
  refresh: $("refresh"),
  busy: $("busy"),
  status: $("status"),
  progress: $("progress"),
  start: $("start"),
  stop: $("stop"),
  restart: $("restart"),
  force: $("force"),
  instanceType: $("instance-type"),
  requestType: $("request-type"),
  az: $("az"),
  bidPrice: $("bid-price"),
};

function setBusy(b) {
  els.busy.hidden = !b;
  for (const id of ["start","stop","restart","refresh","instance"]) els[id].disabled = b;
}

let envConfig = null;
let instanceConfigs = {}; // name → {availabilityZone?, instanceType?, requestType?, ...}

// Per-field "what would we use if the user leaves the override blank".
function resolveDefaults() {
  const inst = instanceConfigs[els.instance.value] || {};
  return {
    availabilityZone: inst.availabilityZone || (envConfig && envConfig.availabilityZone) || "",
    instanceType:     inst.instanceType     || (envConfig && envConfig.defaultInstanceType) || "",
    requestType:      inst.requestType      || (envConfig && envConfig.defaultRequestType)  || "",
    bidPrice:         (envConfig && envConfig.defaultBidPrice) || "",
  };
}

// Show resolved defaults as placeholders / first-option labels so the user sees
// what would actually be used instead of an opaque "from .env" string.
function paintDefaults() {
  const d = resolveDefaults();
  els.az.placeholder = d.availabilityZone;
  els.bidPrice.placeholder = d.bidPrice;
  // Update the empty <option> on the two selects to show the resolved value.
  const itEmpty = els.instanceType.querySelector('option[value=""]');
  if (itEmpty) itEmpty.textContent = d.instanceType ? `(default: ${d.instanceType})` : "(default)";
  const rtEmpty = els.requestType.querySelector('option[value=""]');
  if (rtEmpty) rtEmpty.textContent = d.requestType ? `(default: ${d.requestType})` : "(default)";
}

async function loadInstances() {
  try {
    const [instRes, cfgRes] = await Promise.all([
      fetch("/api/instances"),
      fetch("/api/config"),
    ]);
    envConfig = await cfgRes.json();
    const data = await instRes.json();
    const list = data.instances || [];
    instanceConfigs = Object.fromEntries(list.map(i => [i.name, i]));
    els.instance.innerHTML = list.map(i => `<option>${i.name}</option>`).join("");
    paintDefaults();
    await loadInstanceTypes();
    if (list.length) await refreshStatus();
  } catch (e) {
    els.status.textContent = "Failed to load instances: " + e;
    els.status.className = "error";
  }
}

// Populate the instance-type <select> from the offerings API for the current AZ.
// Re-runs when the selected instance changes (AZ may differ) or when the AZ override changes.
async function loadInstanceTypes() {
  const az = els.az.value || resolveDefaults().availabilityZone;
  const sel = els.instanceType;
  const previous = sel.value;
  sel.innerHTML = `<option value=""></option><option disabled>loading…</option>`;
  paintDefaults();
  try {
    const r = await fetch(`/api/instance-types?az=${encodeURIComponent(az)}`);
    const data = await r.json();
    const types = data.types || [];
    sel.innerHTML =
      `<option value=""></option>` +
      types.map(t => `<option value="${t}">${t}</option>`).join("");
    if (previous && types.includes(previous)) sel.value = previous;
    paintDefaults();
  } catch (e) {
    sel.innerHTML = `<option value=""></option><option disabled>(load failed)</option>`;
    paintDefaults();
  }
}

function buildQuery() {
  const q = new URLSearchParams();
  if (els.instanceType.value) q.set("instanceType", els.instanceType.value);
  if (els.requestType.value)  q.set("requestType",  els.requestType.value);
  if (els.az.value)           q.set("az",           els.az.value);
  if (els.bidPrice.value)     q.set("bidPrice",     els.bidPrice.value);
  return q;
}

// Stream a fetch response into a <pre>, line-by-line.
async function streamInto(target, response) {
  target.textContent = "";
  target.className = response.ok ? "" : "error";
  const reader = response.body.getReader();
  const dec = new TextDecoder();
  while (true) {
    const { value, done } = await reader.read();
    if (done) break;
    target.textContent += dec.decode(value, { stream: true });
    target.scrollTop = target.scrollHeight;
  }
}

async function refreshStatus() {
  const id = els.instance.value;
  if (!id) return;
  setBusy(true);
  try {
    const r = await fetch(`/api/status/${encodeURIComponent(id)}`);
    await streamInto(els.status, r);
  } finally {
    setBusy(false);
  }
}

async function runAction(action) {
  const id = els.instance.value;
  if (!id) return;
  if (action === "stop" || action === "restart") {
    if (!confirm(`${action} ${id}?`)) return;
  }
  const q = buildQuery();
  if (action === "stop" && els.force.checked) q.set("force", "true");
  const url = `/api/${action}/${encodeURIComponent(id)}${q.toString() ? "?" + q : ""}`;

  setBusy(true);
  els.progress.className = "";
  try {
    const r = await fetch(url, { method: "POST" });
    await streamInto(els.progress, r);
    // When the destructive op finishes, refresh the status panel automatically.
    await refreshStatus();
  } catch (e) {
    els.progress.textContent += "\nERROR: " + e;
    els.progress.className = "error";
  } finally {
    setBusy(false);
  }
}

els.instance.addEventListener("change", async () => {
  paintDefaults();
  await loadInstanceTypes();  // AZ may differ per instance
  await refreshStatus();
});
els.refresh.addEventListener("click", refreshStatus);
// Refresh the instance-type list when the AZ override changes (debounced).
let azDebounce;
els.az.addEventListener("input", () => {
  clearTimeout(azDebounce);
  azDebounce = setTimeout(loadInstanceTypes, 400);
});
els.start.addEventListener("click",   () => runAction("start"));
els.restart.addEventListener("click", () => runAction("restart"));
els.stop.addEventListener("click",    () => runAction("stop"));

loadInstances();
</script>
</body>
</html>
